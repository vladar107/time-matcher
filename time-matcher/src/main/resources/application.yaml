ktor:
    application:
        modules:
            - io.vladar107.ApplicationKt.module
    deployment:
        port: 8080

db:
    url: "$DB_URL:jdbc:h2:file:./data/timematcher;DB_CLOSE_DELAY=-1"
    user: "$DB_USER:sa"
    password: "$DB_PASSWORD:"

calendar:
    provider: "$CALENDAR_PROVIDER:inmemory"   # set CALENDAR_PROVIDER=google to enable

google:
    clientId: "$GOOGLE_CLIENT_ID:"
    clientSecret: "$GOOGLE_CLIENT_SECRET:"

publicBaseUrl: "$PUBLIC_BASE_URL:http://localhost:8080"

telegram:
    botToken: "$TELEGRAM_BOT_TOKEN:"
    hostUserId: "$TELEGRAM_HOST_USER_ID:0"
    webhookSecret: "$TELEGRAM_WEBHOOK_SECRET:"
