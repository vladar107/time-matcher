openapi: "3.0.3"
info:
  title: "Time Matcher API"
  description: >
    Time Matcher — availability finder (Phase 1). Computes open meeting slots by
    subtracting busy times (aggregated across calendars) from recurring working
    hours, honoring buffers, minimum notice, and date overrides. Calendar busy
    data and availability rules are held in memory; times are ISO-8601.
  version: "0.0.1"
servers:
  - url: "http://0.0.0.0:8080"
paths:
  /availability/slots:
    get:
      tags: [availability]
      summary: "Find open meeting slots"
      description: >
        Returns open slots within the window, computed from the current
        availability config minus the union of busy blocks across all calendars.
        Slot start/end are rendered in the configured time zone.
      parameters:
        - name: from
          in: query
          required: true
          description: "Window start, ISO-8601 instant."
          schema: { type: string, format: date-time, example: "2030-01-07T00:00:00Z" }
        - name: to
          in: query
          required: true
          description: "Window end, ISO-8601 instant. Must be after `from`."
          schema: { type: string, format: date-time, example: "2030-01-07T23:59:59Z" }
        - name: duration
          in: query
          required: true
          description: "Meeting length, ISO-8601 duration. Must be positive."
          schema: { type: string, example: "PT1H" }
      responses:
        "200":
          description: "Open slots (possibly empty), sorted ascending."
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimeSlot" }
              example:
                - { start: "2030-01-07T09:00:00+01:00", end: "2030-01-07T10:00:00+01:00" }
                - { start: "2030-01-07T11:00:00+01:00", end: "2030-01-07T12:00:00+01:00" }
        "400":
          description: "Invalid query (unparseable from/to/duration, from >= to, or non-positive duration)."
  /availability/config:
    put:
      tags: [availability]
      summary: "Set availability rules"
      description: "Replaces the current availability configuration."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AvailabilityConfigRequest" }
            example:
              zone: "Europe/Paris"
              granularityMinutes: 30
              bufferBeforeMinutes: 0
              bufferAfterMinutes: 0
              minimumNoticeMinutes: 0
              weekly:
                MONDAY: [ { start: "09:00", end: "17:00" } ]
                TUESDAY: [ { start: "09:00", end: "12:00" }, { start: "13:00", end: "17:00" } ]
              overrides:
                - date: "2030-12-25"
                  ranges: []
      responses:
        "204":
          description: "Configuration saved."
        "400":
          description: "Invalid config (bad zone, non-positive granularity, negative buffer/notice, malformed times)."
  /calendars/{calendarId}/busy:
    post:
      tags: [availability]
      summary: "Add a busy block to a calendar"
      description: >
        Records a busy interval on the given calendar. `calendarId` is a free-form
        label (e.g. `work`, `personal`); slots are computed against the union of
        all calendars. Stored in memory (resets on restart).
      parameters:
        - name: calendarId
          in: path
          required: true
          description: "Free-form calendar identifier."
          schema: { type: string, example: "work" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BusyBlockRequest" }
            example: { start: "2030-01-07T10:00:00Z", end: "2030-01-07T11:00:00Z" }
      responses:
        "201":
          description: "Busy block recorded."
        "400":
          description: "Invalid busy block (unparseable instants or start >= end)."
  /user:
    get:
      tags: [user]
      summary: "User endpoint (scaffold)"
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
        - name: email
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: "OK"
          content:
            text/plain:
              schema: { type: string }
    post:
      tags: [user]
      summary: "Create a user (scaffold)"
      description: >
        Accepts a user payload. NOTE: persistence is not yet implemented in
        Phase 1 — the repository currently throws, so this returns 500.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/User" }
      responses:
        "200":
          description: "Echoes the submitted user (intended contract once persistence exists)."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
components:
  schemas:
    TimeSlot:
      type: object
      description: "An open slot. Start/end are ISO-8601 with the configured zone offset."
      required: [start, end]
      properties:
        start: { type: string, format: date-time, example: "2030-01-07T09:00:00+01:00" }
        end: { type: string, format: date-time, example: "2030-01-07T10:00:00+01:00" }
    BusyBlockRequest:
      type: object
      required: [start, end]
      properties:
        start: { type: string, format: date-time, example: "2030-01-07T10:00:00Z" }
        end: { type: string, format: date-time, example: "2030-01-07T11:00:00Z" }
    LocalTimeRange:
      type: object
      description: "Half-open local-time range within a day, HH:mm."
      required: [start, end]
      properties:
        start: { type: string, example: "09:00" }
        end: { type: string, example: "17:00" }
    DateOverride:
      type: object
      description: "Exception for a specific date. Empty `ranges` marks the day unavailable."
      required: [date, ranges]
      properties:
        date: { type: string, format: date, example: "2030-12-25" }
        ranges:
          type: array
          items: { $ref: "#/components/schemas/LocalTimeRange" }
    AvailabilityConfigRequest:
      type: object
      required: [zone, granularityMinutes]
      properties:
        zone: { type: string, description: "IANA zone id.", example: "Europe/Paris" }
        granularityMinutes: { type: integer, format: int64, description: "Slot grid step; must be > 0.", example: 30 }
        bufferBeforeMinutes: { type: integer, format: int64, default: 0, description: "Padding before busy blocks; >= 0." }
        bufferAfterMinutes: { type: integer, format: int64, default: 0, description: "Padding after busy blocks; >= 0." }
        minimumNoticeMinutes: { type: integer, format: int64, default: 0, description: "Earliest offset from now; >= 0." }
        weekly:
          type: object
          description: "Recurring working hours keyed by day of week (MONDAY..SUNDAY)."
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/LocalTimeRange" }
        overrides:
          type: array
          items: { $ref: "#/components/schemas/DateOverride" }
    User:
      type: object
      required: [name]
      properties:
        name: { type: string }
        email: { type: string, nullable: true }
